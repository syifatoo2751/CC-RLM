# CC-RLM — Docker Compose (Ollama)
#
# Quick start:
#   docker compose up -d
#   export ANTHROPIC_BASE_URL=http://localhost:8080
#   claude
#
# For vLLM/GPU setup, see docker-compose.vllm.yml

services:

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-qwen2.5-coder:7b}"]
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  rlm:
    build:
      context: .
      dockerfile: Dockerfile.rlm
    environment:
      - RLM_PORT=8081
      - RLM_TOKEN_BUDGET=${RLM_TOKEN_BUDGET:-8000}
      - RLM_WALKER_TIMEOUT_MS=${RLM_WALKER_TIMEOUT_MS:-500}
      - RLM_STORE_PATH=/data/store.db
    ports:
      - "8081:8081"
    volumes:
      # Mount host home for repo access (read-only)
      - ${HOME}:/host/home:ro
      # Persistent store
      - rlm_data:/data
    depends_on:
      ollama:
        condition: service_healthy

  ccr:
    build:
      context: .
      dockerfile: Dockerfile.ccr
    environment:
      - CCR_PORT=8080
      - CCR_RLM_URL=http://rlm:8081
      - CCR_VLLM_URL=http://ollama:11434
      - CCR_MODEL_OVERRIDE=${OLLAMA_MODEL:-qwen2.5-coder:7b}
      - CCR_ANTHROPIC_FALLBACK_KEY=${CCR_ANTHROPIC_FALLBACK_KEY:-}
      - CCR_FALLBACK_ENABLED=${CCR_FALLBACK_ENABLED:-false}
    ports:
      - "8080:8080"
    depends_on:
      - rlm

volumes:
  ollama_data:
  rlm_data:
